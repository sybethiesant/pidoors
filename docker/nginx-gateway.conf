server {
    listen 80;
    server_name _;

    root /var/www/pidoors-ui;
    index index.html;

    # Proxy /api/* to the PHP backend (pidoors-web nginx)
    location /api/ {
        # Rewrite /api/foo/bar → /api.php?route=foo/bar
        rewrite ^/api/(.*)$ /api.php?route=$1 break;
        proxy_pass http://pidoors-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through cookies (session auth)
        proxy_pass_request_headers on;

        # File upload support
        client_max_body_size 50M;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
