# PiDoors Nginx Configuration — React SPA + PHP API
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/

# Rate limiting zone for API endpoints
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# ── HTTP: redirect all traffic to HTTPS ──

server {
    listen 80;
    listen [::]:80;
    server_name pidoors.local _;

    # Allow CA cert download over HTTP (bootstrap — this is what we're downloading)
    location = /ca.pem {
        alias /var/www/pidoors/ca.pem;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main server ──

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pidoors.local _;

    root /var/www/pidoors-ui;
    index index.html;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/pidoors.crt;
    ssl_certificate_key /etc/ssl/private/pidoors.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Max upload size
    client_max_body_size 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Disable server tokens
    server_tokens off;

    # Logging
    access_log /var/log/nginx/pidoors_access.log;
    error_log /var/log/nginx/pidoors_error.log;

    # ── API: route /api/* to PHP-FPM with rate limiting ──

    location ~ ^/api/(.*)$ {
        limit_req zone=api burst=20 nodelay;

        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_index api.php;
        fastcgi_param SCRIPT_FILENAME /var/www/pidoors/api.php;
        fastcgi_param PATH_INFO /$1;
        fastcgi_param QUERY_STRING $query_string;
        include fastcgi_params;

        fastcgi_param PHP_VALUE "display_errors=Off
log_errors=On
expose_php=Off";
    }

    # Allow downloading the CA cert for door controllers
    location = /ca.pem {
        alias /var/www/pidoors/ca.pem;
    }

    # ── Security: block sensitive paths ──

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block PHP includes directory
    location ~ ^/includes/ {
        deny all;
        return 404;
    }

    # ── Static assets with long cache (hashed filenames from Vite) ──
    # Note: all security headers must be repeated here because nginx drops
    # parent add_header directives when a child block has its own.

    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # ── SPA fallback ──

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached — it references hashed JS/CSS files that
    # change on every build. Caching it causes "stuck on old version after update"
    # issues where the browser keeps loading stale asset URLs.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
