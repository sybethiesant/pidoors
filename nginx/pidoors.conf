# PiDoors Nginx Configuration — React SPA + PHP API
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name pidoors.local _;

    root /var/www/pidoors-ui;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Disable server tokens
    server_tokens off;

    # Logging
    access_log /var/log/nginx/pidoors_access.log;
    error_log /var/log/nginx/pidoors_error.log;

    # ── API: route /api/* to PHP-FPM ──

    location ~ ^/api/(.*)$ {
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_index api.php;
        fastcgi_param SCRIPT_FILENAME /var/www/pidoors/api.php;
        fastcgi_param PATH_INFO /$1;
        fastcgi_param QUERY_STRING $query_string;
        include fastcgi_params;

        fastcgi_param PHP_VALUE "display_errors=Off
log_errors=On
expose_php=Off";
    }

    # Allow downloading the CA cert for door controllers
    location = /ca.pem {
        alias /var/www/pidoors/ca.pem;
    }

    # ── Security: block sensitive paths ──

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block PHP includes directory
    location ~ ^/includes/ {
        deny all;
        return 404;
    }

    # ── Static assets with long cache (hashed filenames from Vite) ──

    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ──

    location / {
        try_files $uri $uri/ /index.html;
    }
}

